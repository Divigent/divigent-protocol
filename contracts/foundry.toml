[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = true
# Allow deploy scripts to write the addresses JSON
fs_permissions = [{ access = "read-write", path = "deployments" }]

[profile.default.fuzz]
runs = 10000
max_test_rejects = 65536
seed = "0x640"

[profile.ci]
fuzz = { runs = 50000 }

remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "test/=test/",
]

[rpc_endpoints]
base = "${BASE_RPC_URL}"
